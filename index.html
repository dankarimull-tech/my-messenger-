<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Хапнет</title>
<style>
:root{--bg0:#0a0b10;--bg1:#0f1118;--bg2:#161820;--bg3:#1e2130;--bg4:#2a2e3f;--text:#eaedf3;--text2:#8891a5;--text3:#4e5568;--accent:#7c6af0;--accent2:#6858d9;--accentG:linear-gradient(135deg,#7c6af0,#5b8def);--green:#2ed573;--red:#ff4757;--yellow:#ffa502;--border:#1e2130;--bubble-me:#302b6e;--bubble-ot:#1a1c26;--radius:16px;--nav-bg:#0f1118;--card-bg:#161820;--input-bg:#0a0b10;--shadow:0 4px 24px rgba(0,0,0,.3);}
body.light{--bg0:#f0f2f5;--bg1:#fff;--bg2:#f7f8fa;--bg3:#eef0f4;--bg4:#dde1e8;--text:#1a1c22;--text2:#5f6878;--text3:#9aa2b0;--border:#e4e6eb;--bubble-me:#e3e0ff;--bubble-ot:#f0f2f5;--nav-bg:#fff;--card-bg:#fff;--input-bg:#f0f2f5;--shadow:0 2px 12px rgba(0,0,0,.08);}
body.t-blue{--accent:#4facfe;--accent2:#3b95e8;--accentG:linear-gradient(135deg,#4facfe,#00f2fe);--bubble-me:#1e3a5f;}
body.t-green{--accent:#00b894;--accent2:#009e80;--accentG:linear-gradient(135deg,#00b894,#55efc4);--bubble-me:#0d3b30;}
body.t-orange{--accent:#f39c12;--accent2:#e08e0b;--accentG:linear-gradient(135deg,#f39c12,#fdcb6e);--bubble-me:#4a3520;}
body.t-pink{--accent:#e84393;--accent2:#d63380;--accentG:linear-gradient(135deg,#e84393,#fd79a8);--bubble-me:#4a1535;}
body.t-red{--accent:#ff4757;--accent2:#ee3545;--accentG:linear-gradient(135deg,#ff4757,#ff6b81);--bubble-me:#4a1520;}
body.light.t-blue{--bubble-me:#d6eeff;}body.light.t-green{--bubble-me:#d0f5eb;}body.light.t-orange{--bubble-me:#fff0d0;}body.light.t-pink{--bubble-me:#fde0ef;}body.light.t-red{--bubble-me:#ffe0e3;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg0);color:var(--text);height:100dvh;overflow:hidden;transition:background .3s,color .3s;}
input,button,textarea,select{font-family:inherit;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px;}
.screen{display:none;height:100dvh;}.screen.active{display:flex;}

#auth-screen{justify-content:center;align-items:center;background:var(--bg1);}
.auth-box{background:var(--card-bg);padding:40px;border-radius:24px;width:400px;max-width:92vw;text-align:center;border:1px solid var(--border);box-shadow:var(--shadow);}
.auth-logo{font-size:44px;font-weight:800;background:var(--accentG);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;letter-spacing:-1px;}
.auth-box h2{color:var(--text2);font-weight:400;font-size:16px;margin-bottom:28px;}
.auth-input{width:100%;padding:14px 18px;margin:6px 0;border-radius:14px;border:2px solid var(--border);background:var(--input-bg);color:var(--text);font-size:15px;outline:none;transition:.3s;}
.auth-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,106,240,.15);}
.auth-btn{width:100%;padding:14px;margin-top:14px;border-radius:14px;border:none;background:var(--accentG);color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:.3s;letter-spacing:.3px;}
.auth-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,106,240,.3);}
.auth-btn:active{transform:translateY(0);}
.auth-remember{display:flex;align-items:center;gap:8px;margin-top:14px;justify-content:center;color:var(--text2);font-size:14px;cursor:pointer;}
.auth-remember input{accent-color:var(--accent);width:18px;height:18px;border-radius:4px;}
.auth-link{margin-top:16px;color:var(--accent);cursor:pointer;font-size:14px;font-weight:500;}.auth-link:hover{text-decoration:underline;}
.auth-error{color:var(--red);margin-top:10px;font-size:13px;min-height:18px;}
.auth-hint{font-size:12px;color:var(--text3);margin-top:4px;text-align:left;padding-left:4px;}

#app-screen{flex-direction:row;}
.sidebar{width:360px;min-width:360px;background:var(--bg1);display:flex;flex-direction:column;border-right:1px solid var(--border);transition:background .3s;}

.side-header{padding:14px 18px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border);min-height:64px;cursor:pointer;transition:.2s;}
.side-header:hover{background:var(--bg3);}
.side-header .hdr-av{width:42px;height:42px;border-radius:50%;object-fit:cover;}
.side-header .hdr-av-ph{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0;}
.side-header-info{flex:1;min-width:0;}
.side-header-name{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.side-header-tag{font-size:12px;color:var(--text2);}

.tab-content{flex:1;overflow-y:auto;display:none;flex-direction:column;}.tab-content.active{display:flex;}
.tab-search{padding:10px 14px;}
.tab-search input{width:100%;padding:11px 16px;border-radius:14px;border:none;background:var(--input-bg);color:var(--text);font-size:14px;outline:none;transition:.2s;}
.tab-search input:focus{box-shadow:0 0 0 2px rgba(124,106,240,.2);}
.section-title{padding:14px 18px 8px;font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;}

.conv-item{display:flex;align-items:center;padding:12px 18px;cursor:pointer;gap:14px;transition:.15s;border-radius:0;}
.conv-item:hover{background:var(--bg3);}
.conv-item.active{background:var(--accentG);color:#fff;}
.conv-item.active .conv-time,.conv-item.active .conv-last{color:rgba(255,255,255,.7);}
.avatar{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0;position:relative;overflow:hidden;transition:.2s;}
.avatar.sm{width:42px;height:42px;font-size:17px;}
.avatar.lg{width:86px;height:86px;font-size:34px;}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.online-dot{position:absolute;bottom:2px;right:2px;width:13px;height:13px;background:var(--green);border-radius:50%;border:2.5px solid var(--bg1);z-index:1;}
.conv-info{flex:1;min-width:0;}
.conv-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.conv-name{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.conv-time{font-size:11px;color:var(--text3);flex-shrink:0;margin-left:8px;}
.conv-bottom{display:flex;justify-content:space-between;align-items:center;}
.conv-last{font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.conv-last .me{color:var(--accent);}
.conv-unread{background:var(--accentG);color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:12px;margin-left:8px;min-width:22px;text-align:center;}
.empty-state{padding:50px 24px;text-align:center;color:var(--text3);font-size:14px;line-height:1.7;}
.empty-icon{font-size:52px;margin-bottom:14px;}
.req-item{display:flex;align-items:center;padding:12px 18px;gap:12px;}
.req-btns{display:flex;gap:6px;}
.req-btn{padding:8px 14px;border-radius:12px;border:none;font-size:13px;cursor:pointer;font-weight:600;transition:.2s;}
.req-btn.accept{background:var(--accentG);color:#fff;}
.req-btn.decline{background:var(--bg4);color:var(--text2);}
.req-btn:hover{transform:scale(1.05);}
.search-btn{padding:8px 14px;border-radius:12px;border:none;font-size:12px;cursor:pointer;font-weight:600;background:var(--accentG);color:#fff;transition:.2s;}
.search-btn.pending{background:var(--bg4);color:var(--text3);cursor:default;}
.search-btn:hover{opacity:.9;}

.settings-section{padding:18px;}
.settings-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px;}
.settings-avatar-wrap{display:flex;align-items:center;gap:18px;margin-bottom:18px;}
.settings-avatar-wrap .avatar{cursor:pointer;transition:.3s;}.settings-avatar-wrap .avatar:hover{opacity:.8;transform:scale(1.05);}
.settings-field{margin-bottom:14px;}
.settings-field label{display:block;font-size:12px;color:var(--text3);margin-bottom:5px;text-transform:uppercase;font-weight:600;letter-spacing:.5px;}
.settings-field input,.settings-field textarea{width:100%;padding:11px 14px;border-radius:12px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:14px;outline:none;resize:none;transition:.2s;}
.settings-field input:focus,.settings-field textarea:focus{border-color:var(--accent);}
.settings-save{padding:11px 28px;border-radius:12px;border:none;background:var(--accentG);color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:.2s;}.settings-save:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(124,106,240,.25);}
.theme-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
.theme-dot{width:38px;height:38px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.25s;}.theme-dot:hover{transform:scale(1.15);}.theme-dot.active{border-color:var(--text);transform:scale(1.1);}
.bg-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.bg-opt{width:50px;height:50px;border-radius:12px;cursor:pointer;border:3px solid transparent;transition:.2s;}.bg-opt:hover{transform:scale(1.1);}.bg-opt.active{border-color:var(--accent);}
.settings-logout{width:100%;padding:13px;border-radius:12px;border:1px solid var(--red);background:none;color:var(--red);font-size:14px;font-weight:600;cursor:pointer;margin-top:14px;transition:.2s;}.settings-logout:hover{background:var(--red);color:#fff;}

.bottom-nav{display:flex;border-top:1px solid var(--border);background:var(--nav-bg);transition:background .3s;}
.nav-btn{flex:1;padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:10px;font-weight:700;transition:.2s;position:relative;}
.nav-btn:hover{color:var(--text2);}
.nav-btn.active{color:var(--accent);}
.nav-btn .nav-icon{font-size:22px;transition:.2s;}
.nav-btn.active .nav-icon{transform:scale(1.15);}
.nav-badge{position:absolute;top:3px;right:calc(50% - 20px);background:var(--red);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:700;animation:pop .3s ease;}
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}

.chat-panel{flex:1;display:none;flex-direction:column;background:var(--bg0);transition:background .3s;}.chat-panel.active{display:flex;}
.no-chat{flex:1;display:flex;justify-content:center;align-items:center;flex-direction:column;color:var(--text3);gap:12px;}.no-chat.hidden{display:none;}
.no-chat-icon{font-size:60px;}

.chat-header{padding:10px 18px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border);background:var(--bg1);min-height:60px;transition:background .3s;}
.back-btn{display:none;background:none;border:none;color:var(--text2);font-size:24px;cursor:pointer;padding:4px 8px;border-radius:10px;transition:.2s;}.back-btn:hover{background:var(--bg3);}
.chat-header-info{flex:1;cursor:pointer;}
.chat-header-name{font-weight:700;font-size:15px;}
.chat-header-status{font-size:12px;color:var(--text3);}.chat-header-status.on{color:var(--green);}

.messages{flex:1;overflow-y:auto;padding:12px 18px;display:flex;flex-direction:column;gap:4px;background-size:cover;background-position:center;}
.msg{display:flex;flex-direction:column;max-width:72%;animation:mIn .25s ease;}
@keyframes mIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg.mine{align-self:flex-end;}.msg.other{align-self:flex-start;}
.msg-bubble{padding:9px 14px;border-radius:var(--radius);word-wrap:break-word;line-height:1.5;position:relative;transition:background .3s;}
.msg.mine .msg-bubble{background:var(--bubble-me);border-bottom-right-radius:4px;}
.msg.other .msg-bubble{background:var(--bubble-ot);border-bottom-left-radius:4px;}
.msg-text{font-size:14.5px;white-space:pre-wrap;}
.msg-media{max-width:280px;max-height:280px;border-radius:12px;cursor:pointer;margin:4px 0;display:block;}
.msg-video{max-width:280px;border-radius:12px;margin:4px 0;}
.msg-file{display:flex;align-items:center;gap:10px;padding:8px 0;text-decoration:none;color:var(--text);}
.msg-file-icon{font-size:30px;}.msg-file-name{font-size:13px;font-weight:600;}.msg-file-size{font-size:11px;color:var(--text3);}
.msg-footer{display:flex;justify-content:flex-end;align-items:center;gap:5px;margin-top:3px;}
.msg-time{font-size:11px;color:var(--text3);}
.msg.mine .msg-time{color:rgba(255,255,255,.35);}
.msg-date-sep{text-align:center;color:var(--text3);font-size:12px;padding:12px 0 6px;}

.msg-check{display:inline-flex;margin-left:3px;vertical-align:middle;}
.msg-check svg{width:20px;height:13px;}

.msg-reactions{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.msg-reaction{display:flex;align-items:center;gap:3px;padding:2px 8px;border-radius:12px;background:var(--bg3);font-size:13px;cursor:pointer;border:1px solid transparent;transition:.15s;}
.msg-reaction:hover{border-color:var(--accent);}
.msg-reaction.mine{border-color:var(--accent);background:rgba(124,106,240,.15);}
.msg-reaction .rcount{font-size:11px;color:var(--text2);}

.reaction-picker{display:none;position:absolute;bottom:100%;right:0;background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:6px 8px;gap:4px;box-shadow:var(--shadow);z-index:10;flex-direction:row;}
.reaction-picker.show{display:flex;}
.reaction-pick{font-size:22px;cursor:pointer;padding:4px;border-radius:8px;transition:.15s;}.reaction-pick:hover{background:var(--bg3);transform:scale(1.2);}

.bobs-msg{background:linear-gradient(135deg,#ff6b6b,#ffa502)!important;text-align:center;padding:16px!important;border-radius:18px!important;}
.bobs-msg .bobs-emoji{font-size:48px;display:block;margin-bottom:6px;}
.bobs-msg .bobs-text{font-size:14px;font-weight:600;color:#fff;}

.typing-area{padding:3px 18px;height:22px;font-size:12px;color:var(--text3);font-style:italic;}
.input-area{padding:10px 14px;display:flex;align-items:flex-end;gap:8px;background:var(--bg1);border-top:1px solid var(--border);transition:background .3s;}
.attach-btn,.bobs-btn{background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;padding:8px;border-radius:12px;flex-shrink:0;transition:.2s;}.attach-btn:hover,.bobs-btn:hover{color:var(--accent);background:var(--bg3);}
.bobs-btn{font-size:18px;font-weight:800;color:var(--yellow);}
.msg-input{flex:1;padding:11px 16px;border-radius:14px;border:none;background:var(--input-bg);color:var(--text);font-size:15px;outline:none;resize:none;max-height:120px;line-height:1.4;transition:.2s;}
.msg-input:focus{box-shadow:0 0 0 2px rgba(124,106,240,.15);}
.send-btn{background:var(--accentG);border:none;color:#fff;font-size:18px;cursor:pointer;padding:0;border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;}.send-btn:hover{transform:scale(1.08);}
#file-input{display:none;}
.upload-preview{padding:10px 14px;background:var(--bg1);border-top:1px solid var(--border);display:none;align-items:center;gap:12px;transition:background .3s;}.upload-preview.show{display:flex;}
.upload-thumb{width:46px;height:46px;border-radius:10px;object-fit:cover;}
.upload-name{font-size:12px;font-weight:600;}.upload-size{font-size:11px;color:var(--text3);}
.upload-cancel{background:none;border:none;color:var(--red);cursor:pointer;font-size:20px;padding:4px;margin-left:auto;}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;justify-content:center;align-items:center;backdrop-filter:blur(4px);}.modal-overlay.show{display:flex;}
.modal{background:var(--card-bg);border-radius:24px;width:400px;max-width:92vw;max-height:85vh;overflow-y:auto;border:1px solid var(--border);box-shadow:var(--shadow);}
.modal-header{text-align:center;padding:28px 24px 14px;position:relative;}
.modal-close{position:absolute;top:14px;right:18px;background:none;border:none;color:var(--text3);font-size:24px;cursor:pointer;transition:.2s;}.modal-close:hover{color:var(--text);}
.modal-avatar{margin:0 auto 12px;}
.modal-name{font-size:22px;font-weight:800;}
.modal-tag{font-size:14px;color:var(--accent);margin-top:3px;font-weight:600;}
.modal-status{font-size:13px;color:var(--text3);margin-top:5px;}
.modal-bio{font-size:14px;color:var(--text2);padding:0 24px;margin-top:10px;text-align:center;line-height:1.5;}
.modal-info{padding:14px 24px;}
.modal-info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px;}
.modal-info-row .label{color:var(--text3);}
.modal-media{padding:14px 24px 24px;}
.modal-media-title{font-size:14px;font-weight:700;margin-bottom:10px;color:var(--text2);}
.modal-media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.modal-media-grid img,.modal-media-grid video{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;cursor:pointer;}
.modal-actions{padding:14px 24px 24px;display:flex;gap:10px;}
.modal-actions button{flex:1;padding:12px;border-radius:14px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:.2s;}
.modal-actions .btn-msg{background:var(--accentG);color:#fff;}
.modal-actions .btn-friend{background:var(--bg4);color:var(--text);}
.modal-actions button:hover{transform:translateY(-1px);}

.viewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;justify-content:center;align-items:center;cursor:pointer;}.viewer.show{display:flex;}
.viewer img{max-width:94vw;max-height:94vh;border-radius:10px;}

@media(max-width:700px){
.sidebar{width:100%;min-width:100%;}
#app-screen.show-chat .sidebar{display:none;}
#app-screen.show-chat .chat-panel{display:flex;}
#app-screen.show-chat .no-chat{display:none;}
.back-btn{display:block;}.msg{max-width:88%;}.msg-media{max-width:220px;}
}
</style>
</head>
<body>

<div id="auth-screen" class="screen active">
<div class="auth-box">
  <div class="auth-logo">ХАПНЕТ</div>
  <h2 id="auth-title">Войти в аккаунт</h2>
  <input class="auth-input" id="a-user" placeholder="Логин (английские буквы)">
  <div id="a-name-wrap" style="display:none"><input class="auth-input" id="a-name" placeholder="Отображаемое имя (любой язык)"></div>
  <input class="auth-input" id="a-pass" type="password" placeholder="Пароль">
  <div class="auth-hint" id="a-hint" style="display:none">Минимум 8 символов, буквы + цифры, английская раскладка</div>
  <label class="auth-remember"><input type="checkbox" id="a-remember" checked> Запомнить меня</label>
  <button class="auth-btn" onclick="doAuth()" id="a-btn">Войти</button>
  <div class="auth-link" onclick="toggleAuth()" id="a-link">Нет аккаунта? Зарегистрироваться</div>
  <div class="auth-error" id="a-error"></div>
</div>
</div>

<div id="app-screen" class="screen">
<div class="sidebar">
  <div class="side-header" onclick="openMyProfile()">
    <div class="hdr-av-ph" id="side-avatar" style="background:var(--accent)">?</div>
    <div class="side-header-info">
      <div class="side-header-name" id="side-name">...</div>
      <div class="side-header-tag" id="side-tag">@...</div>
    </div>
  </div>
  <div class="tab-content active" id="tab-chats"><div id="conv-list"></div></div>
  <div class="tab-content" id="tab-friends">
    <div class="tab-search"><input id="friend-search" placeholder="🔍 Найти людей..." oninput="onSearch(this.value)"></div>
    <div id="search-results"></div>
    <div class="section-title" id="req-title" style="display:none">Запросы в друзья</div>
    <div id="req-list"></div>
    <div class="section-title">Мои друзья</div>
    <div id="friends-list"></div>
  </div>
  <div class="tab-content" id="tab-settings">
    <div class="settings-section">
      <div class="settings-title">Профиль</div>
      <div class="settings-avatar-wrap">
        <div class="avatar lg" id="set-avatar" onclick="document.getElementById('avatar-input').click()" style="background:var(--accent)">?</div>
        <input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
        <div><div style="font-weight:700" id="set-name">Имя</div><div style="font-size:12px;color:var(--text3)">Нажми на аватар</div></div>
      </div>
      <div class="settings-field"><label>Отображаемое имя</label><input id="set-display" placeholder="Как тебя зовут"></div>
      <div class="settings-field"><label>Неймтег</label><input id="set-nametag" placeholder="@username"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
var socket=io(),me='',myDisplay='',myProfile={},isReg=false,currentChat=null,conversations=[],pendingFile=null,typTimer=null,typDisp=null,profTarget='',profIsFriend=false,activeTab='chats',currentChatId=null,reqCount=0;
var COLORS=['#e06c75','#e5c07b','#98c379','#56b6c2','#61afef','#c678dd','#be5046','#d19a66','#7c6af0','#00b894'];
function aC(n){var h=0;for(var i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return COLORS[Math.abs(h)%COLORS.length]}
function aL(n){return n.charAt(0).toUpperCase()}
function fS(b){if(b<1024)return b+' Б';if(b<1048576)return(b/1024).toFixed(1)+' КБ';return(b/1048576).toFixed(1)+' МБ'}
function fSeen(ts){if(!ts)return'был(а) давно';var d=new Date(ts),diff=Date.now()-d;if(diff<60000)return'только что';if(diff<3600000)return Math.floor(diff/60000)+' мин. назад';return d.toLocaleDateString('ru-RU')}
function fDate(ts){return new Date(ts).toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'})}
function avHTML(name,url,size,on){var c='avatar'+(size==='sm'?' sm':size==='lg'?' lg':''),d=on?'<div class="online-dot"></div>':'';return url?'<div class="'+c+'" style="background:'+aC(name)+'"><img src="'+url+'">'+d+'</div>':'<div class="'+c+'" style="background:'+aC(name)+'">'+aL(name)+d+'</div>'}
function checkSVG(mine,read){
  if(!mine)return'';
  if(read)return'<span class="msg-check"><svg viewBox="0 0 24 16"><rect x="2" y="6" width="12" height="4" rx="2" fill="#8B7355"/><rect x="12" y="5.5" width="5" height="5" rx="1.5" fill="#D4A574"/><circle cx="16.5" cy="7" r="2.5" fill="#FF6B35" opacity=".9"/><path d="M16 4Q18 1 15-1" stroke="#aaa" fill="none" stroke-width="1" opacity=".6"/><path d="M17.5 3Q19.5 0 16.5-2" stroke="#999" fill="none" stroke-width=".8" opacity=".4"/></svg></span>';
  return'<span class="msg-check"><svg viewBox="0 0 24 16"><rect x="2" y="6" width="12" height="4" rx="2" fill="#666" opacity=".5"/><rect x="12" y="5.5" width="5" height="5" rx="1.5" fill="#888" opacity=".4"/><circle cx="16.5" cy="7" r="2" fill="#555" opacity=".3"/></svg></span>';
}
function reactionsHTML(reactions,msgId,chatId){
  if(!reactions||!Object.keys(reactions).length)return'';
  var h='<div class="msg-reactions">';
  for(var emoji in reactions){var users=reactions[emoji];var isMine=users.includes(me);
    h+='<div class="msg-reaction'+(isMine?' mine':'')+'" onclick="react(\''+chatId+'\',\''+msgId+'\',\''+emoji+'\')">'+emoji+'<span class="rcount">'+users.length+'</span></div>';}
  return h+'</div>';
}
function gT(){return localStorage.getItem('token')||sessionStorage.getItem('token')}
function requestNotifPerm(){if('Notification'in window&&Notification.permission==='default')Notification.requestPermission();}
function showNotif(title,body){if('Notification'in window&&Notification.permission==='granted'&&document.hidden)new Notification(title,{body:body,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">💬</text></svg>'});}

window.onload=function(){
  var t=gT(),u=localStorage.getItem('username')||sessionStorage.getItem('username');
  applyTheme();applyChatBg();
  if(t&&u){me=u;socket.emit('auth',t);}
  requestNotifPerm();
};
function toggleAuth(){isReg=!isReg;document.getElementById('auth-title').textContent=isReg?'Создать аккаунт':'Войти в аккаунт';document.getElementById('a-btn').textContent=isReg?'Зарегистрироваться':'Войти';document.getElementById('a-link').textContent=isReg?'Уже есть аккаунт? Войти':'Нет аккаунта? Зарегистрироваться';document.getElementById('a-error').textContent='';document.getElementById('a-name-wrap').style.display=isReg?'':'none';document.getElementById('a-hint').style.display=isReg?'':'none';}
function doAuth(){var login=document.getElementById('a-user').value.trim(),pass=document.getElementById('a-pass').value,name=document.getElementById('a-name').value.trim(),rem=document.getElementById('a-remember').checked,err=document.getElementById('a-error');
  if(!login||!pass){err.textContent='Заполни все поля';return;}
  var body={username:login,password:pass};if(isReg)body.displayName=name||login;
  fetch('/api/'+(isReg?'register':'login'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(r){return r.json()}).then(function(d){if(d.ok){var s=rem?localStorage:sessionStorage;s.setItem('token',d.token);s.setItem('username',d.username);me=d.username;socket.emit('auth',d.token)}else err.textContent=d.error}).catch(function(){err.textContent='Ошибка сети'});}
function logout(){localStorage.clear();sessionStorage.clear();location.reload()}
socket.on('auth_ok',function(d){me=d.username;myDisplay=d.displayName||me;myProfile=d.profile||{};reqCount=d.requestCount||0;document.getElementById('auth-screen').classList.remove('active');document.getElementById('app-screen').classList.add('active');updateSide();updateSettings();updateReqBadge();requestNotifPerm();});
socket.on('auth_fail',function(){localStorage.clear();sessionStorage.clear();document.getElementById('auth-screen').classList.add('active');document.getElementById('app-screen').classList.remove('active')});
socket.on('connect',function(){var t=gT();if(t)socket.emit('auth',t)});

function updateSide(){var el=document.getElementById('side-avatar');if(myProfile.avatar)el.innerHTML='<img src="'+myProfile.avatar+'" style="width:42px;height:42px;border-radius:50%;object-fit:cover">';else{el.textContent=aL(myDisplay||me);el.style.background=aC(me)}document.getElementById('side-name').textContent=myDisplay||me;document.getElementById('side-tag').textContent=myProfile.nametag||'@'+me;}
function switchTab(t){activeTab=t;document.querySelectorAll('.tab-content').forEach(function(e){e.classList.remove('active')});document.getElementById('tab-'+t).classList.add('active');document.querySelectorAll('.nav-btn').forEach(function(e){e.classList.remove('active')});document.getElementById('nav-'+t).classList.add('active');if(t==='friends'){loadFriends();loadRequests();}}
function updateReqBadge(){var b=document.getElementById('badge-friends');if(reqCount>0){b.textContent=reqCount;b.style.display=''}else b.style.display='none';}

socket.on('conversations',function(l){conversations=l;renderConvos();updateChatBadge()});
function renderConvos(){var el=document.getElementById('conv-list');if(!conversations.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">💬</div>Нет диалогов<br>Найди друзей во вкладке 👥</div>';return}var h='';for(var i=0;i<conversations.length;i++){var c=conversations[i],isA=currentChat===c.username,lt='';if(c.lastMessage){var px=c.lastMessage.from===me?'<span class="me">Вы: </span>':'';if(c.lastMessage.type==='bobs')lt=px+'🍬 БОБС';else if(c.lastMessage.type==='image')lt=px+'📷 Фото';else if(c.lastMessage.type==='video')lt=px+'🎥 Видео';else if(c.lastMessage.type==='file')lt=px+'📄 Файл';else lt=px+c.lastMessage.text}var ur=c.unreadCount?'<span class="conv-unread">'+c.unreadCount+'</span>':'';h+='<div class="conv-item'+(isA?' active':'')+'" onclick="openChat(\''+c.username+'\')">'+avHTML(c.username,c.avatar,'',c.online)+'<div class="conv-info"><div class="conv-top"><span class="conv-name">'+(c.displayName||c.username)+'</span><span class="conv-time">'+(c.lastMessage?c.lastMessage.time:'')+'</span></div><div class="conv-bottom"><span class="conv-last">'+lt+'</span>'+ur+'</div></div></div>'}el.innerHTML=h}
function updateChatBadge(){var t=0;conversations.forEach(function(c){t+=c.unreadCount||0});var b=document.getElementById('badge-chats');if(t>0){b.textContent=t;b.style.display=''}else b.style.display='none'}

var sTO;function onSearch(q){clearTimeout(sTO);var sr=document.getElementById('search-results');if(!q.trim()){sr.innerHTML='';return}sTO=setTimeout(function(){fetch('/api/users/search?q='+encodeURIComponent(q),{headers:{Authorization:'Bearer '+gT()}}).then(function(r){return r.json()}).then(function(users){if(!users.length){sr.innerHTML='<div class="empty-state">Никого не найдено</div>';return}sr.innerHTML=users.map(function(u){var btn='';if(u.isFriend)btn='<span style="color:var(--green);font-size:12px">✓ Друзья</span>';else if(u.isPending)btn='<button class="search-btn pending">Отправлено</button>';else if(u.hasRequest)btn='<button class="search-btn" onclick="event.stopPropagation();acceptReq(\''+u.username+'\')">Принять</button>';else btn='<button class="search-btn" onclick="event.stopPropagation();sendReq(\''+u.username+'\')">+ Добавить</button>';return'<div class="conv-item" onclick="openProfile(\''+u.username+'\')">'+avHTML(u.username,u.avatar,'',u.online)+'<div class="conv-info" style="flex:1"><div class="conv-name">'+(u.displayName||u.username)+'</div><div style="font-size:12px;color:var(--text3)">'+(u.nametag||'')+'</div></div>'+btn+'</div>'}).join('')})},300)}

function loadRequests(){fetch('/api/friends/requests',{headers:{Authorization:'Bearer '+gT()}}).then(function(r){return r.json()}).then(function(list){var el=document.getElementById('req-list'),tl=document.getElementById('req-title');reqCount=list.length;updateReqBadge();if(!list.length){tl.style.display='none';el.innerHTML='';return}tl.style.display='';el.innerHTML=list.map(function(r){return'<div class="req-item">'+avHTML(r.from,r.avatar,'sm',false)+'<div class="conv-info" style="flex:1"><div class="conv-name">'+(r.displayName||r.from)+'</div><div style="font-size:12px;color:var(--text3)">'+(r.nametag||'')+'</div></div><div class="req-btns"><button class="req-btn accept" onclick="acceptReq(\''+r.from+'\')">✓</button><button class="req-btn decline" onclick="declineReq(\''+r.from+'\')">✕</button></div></div>'}).join('')})}
function loadFriends(){fetch('/api/friends',{headers:{Authorization:'Bearer '+gT()}}).then(function(r){return r.json()}).then(function(list){var el=document.getElementById('friends-list');if(!list.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">👥</div>Пока нет друзей</div>';return}el.innerHTML=list.map(function(u){return'<div class="conv-item" onclick="openChat(\''+u.username+'\');switchTab(\'chats\')">'+avHTML(u.username,u.avatar,'',u.online)+'<div class="conv-info"><div class="conv-name">'+(u.displayName||u.username)+'</div><div style="font-size:12px;color:var(--text3)">'+(u.nametag||'')+'</div></div></div>'}).join('')})}
function sendReq(u){fetch('/api/friends/request',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+gT()},body:JSON.stringify({username:u})}).then(function(r){return r.json()}).then(function(d){if(d.ok){if(d.autoAccepted)loadFriends();onSearch(document.getElementById('friend-search').value)}})}
function acceptReq(u){fetch('/api/friends/accept',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+gT()},body:JSON.stringify({username:u})}).then(function(r){return r.json()}).then(function(d){if(d.ok){loadRequests();loadFriends()}})}
function declineReq(u){fetch('/api/friends/decline',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+gT()},body:JSON.stringify({username:u})}).then(function(r){return r.json()}).then(function(d){if(d.ok)loadRequests()})}
function removeFriend(u){fetch('/api/friends/remove',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+gT()},body:JSON.stringify({username:u})}).then(function(r){return r.json()}).then(function(d){if(d.ok)loadFriends()})}

socket.on('friend_request',function(d){reqCount++;updateReqBadge();showNotif('Хапнет','Запрос в друзья от '+(d.displayName||d.from));if(activeTab==='friends')loadRequests()});
socket.on('friend_accepted',function(d){if(activeTab==='friends')loadFriends()});

function openChat(u){currentChat=u;currentChatId=null;switchTab('chats');document.getElementById('chat-panel').classList.add('active');document.getElementById('no-chat').classList.add('hidden');document.getElementById('app-screen').classList.add('show-chat');document.getElementById('ch-name').textContent=u;document.getElementById('ch-status').textContent='...';document.getElementById('messages').innerHTML='';document.getElementById('typing-area').textContent='';var a=document.getElementById('ch-avatar');a.style.background=aC(u);a.innerHTML=aL(u);socket.emit('get_messages',{withUser:u});renderConvos();document.getElementById('msg-input').focus();applyChatBg();}
function goBack(){document.getElementById('app-screen').classList.remove('show-chat');currentChat=null;currentChatId=null;renderConvos()}

socket.on('messages',function(d){if(d.withUser!==currentChat)return;currentChatId=d.chatId;var s=document.getElementById('ch-status');if(d.online){s.textContent='в сети';s.className='chat-header-status on'}else{s.textContent=fSeen(d.lastSeen);s.className='chat-header-status'}document.getElementById('ch-name').textContent=d.displayName||d.withUser;var a=document.getElementById('ch-avatar');if(d.avatar)a.innerHTML='<img src="'+d.avatar+'">';var el=document.getElementById('messages');el.innerHTML='';var lastD='';for(var i=0;i<d.messages.length;i++){var m=d.messages[i],dt=new Date(m.timestamp).toLocaleDateString('ru-RU',{day:'numeric',month:'long'});if(dt!==lastD){lastD=dt;var sep=document.createElement('div');sep.className='msg-date-sep';sep.textContent=dt;el.appendChild(sep)}el.appendChild(createMsg(m,d.chatId||currentChatId))}el.scrollTop=el.scrollHeight});

function createMsg(m,chatId){var mine=m.from===me,div=document.createElement('div');div.className='msg '+(mine?'mine':'other');div.dataset.id=m.id;var media='',txt='';
  if(m.type==='bobs'){div.innerHTML='<div class="msg-bubble bobs-msg"><span class="bobs-emoji">🍬</span><span class="bobs-text">Вас угостили конфеткой БОБС!</span><div class="msg-footer"><span class="msg-time">'+m.time+'</span>'+checkSVG(mine,m.read)+'</div></div>'+reactionsHTML(m.reactions,m.id,chatId);return div}
  if(m.type==='image'&&m.filePath)media='<img class="msg-media" src="'+m.filePath+'" onclick="viewImg(\''+m.filePath+'\')" loading="lazy">';
  else if(m.type==='video'&&m.filePath)media='<video class="msg-video" src="'+m.filePath+'" controls preload="metadata"></video>';
  else if(m.type==='file'&&m.filePath)media='<a class="msg-file" href="'+m.filePath+'" download target="_blank"><span class="msg-file-icon">📄</span><div><div class="msg-file-name">'+(m.fileName||'Файл')+'</div><div class="msg-file-size">'+(m.fileSize?fS(m.fileSize):'')+'</div></div></a>';
  if(m.text)txt='<div class="msg-text">'+m.text+'</div>';
  div.innerHTML='<div class="msg-bubble" ondblclick="showReactPicker(event,\''+m.id+'\',\''+chatId+'\')">'+media+txt+'<div class="reaction-picker" id="rp-'+m.id+'"><span class="reaction-pick" onclick="react(\''+chatId+'\',\''+m.id+'\',\'👍\')">👍</span><span class="reaction-pick" onclick="react(\''+chatId+'\',\''+m.id+'\',\'❤️\')">❤️</span><span class="reaction-pick" onclick="react(\''+chatId+'\',\''+m.id+'\',\'😂\')">😂</span><span class="reaction-pick" onclick="react(\''+chatId+'\',\''+m.id+'\',\'😮\')">😮</span><span class="reaction-pick" onclick="react(\''+chatId+'\',\''+m.id+'\',\'🔥\')">🔥</span><span class="reaction-pick" onclick="react(\''+chatId+'\',\''+m.id+'\',\'💀\')">💀</span></div><div class="msg-footer"><span class="msg-time">'+m.time+'</span>'+checkSVG(mine,m.read)+'</div></div>'+reactionsHTML(m.reactions,m.id,chatId);
  return div}

function showReactPicker(e,msgId,chatId){e.preventDefault();e.stopPropagation();document.querySelectorAll('.reaction-picker.show').forEach(function(p){p.classList.remove('show')});var p=document.getElementById('rp-'+msgId);if(p)p.classList.toggle('show');setTimeout(function(){document.addEventListener('click',function h(){document.querySelectorAll('.reaction-picker.show').forEach(function(p){p.classList.remove('show')});document.removeEventListener('click',h)})},10)}
function react(chatId,msgId,emoji){socket.emit('react',{chatId:chatId,messageId:msgId,emoji:emoji});document.querySelectorAll('.reaction-picker.show').forEach(function(p){p.classList.remove('show')})}
socket.on('reaction_updated',function(d){var msgEl=document.querySelector('.msg[data-id="'+d.messageId+'"]');if(!msgEl)return;var old=msgEl.querySelector('.msg-reactions');var html=reactionsHTML(d.reactions,d.messageId,d.chatId);if(old)old.outerHTML=html;else msgEl.querySelector('.msg-bubble').insertAdjacentHTML('afterend',html)});

function sendMessage(){var input=document.getElementById('msg-input'),text=input.value.trim();if(!currentChat)return;if(pendingFile){uploadSend(text);return}if(!text)return;socket.emit('send_message',{to:currentChat,text:text,type:'text'});input.value='';autoResize(input)}
function sendBobs(){if(!currentChat)return;socket.emit('send_message',{to:currentChat,text:'',type:'bobs'})}
function uploadSend(text){var form=new FormData();form.append('file',pendingFile);fetch('/api/upload',{method:'POST',headers:{Authorization:'Bearer '+gT()},body:form}).then(function(r){return r.json()}).then(function(d){if(d.ok)socket.emit('send_message',{to:currentChat,text:text||'',type:d.fileType,filePath:d.filePath,fileName:d.fileName,fileSize:d.fileSize})});cancelUpload();document.getElementById('msg-input').value=''}
function onInputKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}
function onFileSelected(i){if(!i.files[0])return;pendingFile=i.files[0];document.getElementById('upload-name').textContent=pendingFile.name;document.getElementById('upload-size').textContent=fS(pendingFile.size);var t=document.getElementById('upload-thumb');if(pendingFile.type.startsWith('image/')){t.src=URL.createObjectURL(pendingFile);t.style.display=''}else t.style.display='none';document.getElementById('upload-preview').classList.add('show');i.value=''}
function cancelUpload(){pendingFile=null;document.getElementById('upload-preview').classList.remove('show')}
function viewImg(s){document.getElementById('viewer-img').src=s;document.getElementById('viewer').classList.add('show')}

socket.on('new_message',function(d){if(d.message.from===currentChat||d.message.from===me){var el=document.getElementById('messages');el.appendChild(createMsg(d.message,d.chatId));el.scrollTop=el.scrollHeight;if(d.message.from===currentChat){socket.emit('read',{chatId:d.chatId});currentChatId=d.chatId}}if(d.message.from!==me)showNotif('Хапнет',d.message.type==='bobs'?'🍬 Вас угостили БОБС!':d.message.text||'Новое сообщение')});
socket.on('typing',function(d){if(d.from===currentChat){document.getElementById('typing-area').textContent='печатает...';clearTimeout(typDisp);typDisp=setTimeout(function(){document.getElementById('typing-area').textContent=''},2500)}});
function emitTyping(){if(!currentChat||typTimer)return;socket.emit('typing',{to:currentChat});typTimer=setTimeout(function(){typTimer=null},2000)}
socket.on('user_status',function(d){if(d.username===currentChat){var el=document.getElementById('ch-status');if(d.online){el.textContent='в сети';el.className='chat-header-status on'}else{el.textContent=fSeen(d.lastSeen);el.className='chat-header-status'}}conversations.forEach(function(c){if(c.username===d.username)c.online=d.online});renderConvos()});
socket.on('messages_read',function(d){if(d.by===currentChat)document.querySelectorAll('.msg.mine .msg-check').forEach(function(el){el.innerHTML='<svg viewBox="0 0 24 16"><rect x="2" y="6" width="12" height="4" rx="2" fill="#8B7355"/><rect x="12" y="5.5" width="5" height="5" rx="1.5" fill="#D4A574"/><circle cx="16.5" cy="7" r="2.5" fill="#FF6B35" opacity=".9"/><path d="M16 4Q18 1 15-1" stroke="#aaa" fill="none" stroke-width="1" opacity=".6"/><path d="M17.5 3Q19.5 0 16.5-2" stroke="#999" fill="none" stroke-width=".8" opacity=".4"/></svg>'})});

function updateSettings(){document.getElementById('set-name').textContent=myDisplay||me;document.getElementById('set-display').value=myDisplay||'';document.getElementById('set-nametag').value=myProfile.nametag||'@'+me;document.getElementById('set-bio').value=myProfile.bio||'';document.getElementById('set-bday').value=myProfile.birthday||'';var a=document.getElementById('set-avatar');if(myProfile.avatar)a.innerHTML='<img src="'+myProfile.avatar+'">';else{a.textContent=aL(myDisplay||me);a.style.background=aC(me)}}
function saveProfile(){var d={displayName:document.getElementById('set-display').value,nametag:document.getElementById('set-nametag').value,bio:document.getElementById('set-bio').value,birthday:document.getElementById('set-bday').value};fetch('/api/profile/update',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+gT()},body:JSON.stringify(d)}).then(function(r){return r.json()}).then(function(r){var e=document.getElementById('set-error');if(r.ok){myProfile=r.profile;myDisplay=r.displayName||myDisplay;updateSide();updateSettings();e.style.color='var(--green)';e.textContent='✓ Сохранено';setTimeout(function(){e.textContent=''},2000)}else{e.style.color='var(--red)';e.textContent=r.error}})}
function uploadAvatar(i){if(!i.files[0])return;var f=new FormData();f.append('avatar',i.files[0]);fetch('/api/avatar',{method:'POST',headers:{Authorization:'Bearer '+gT()},body:f}).then(function(r){return r.json()}).then(function(d){if(d.ok){myProfile.avatar=d.avatar;updateSide();updateSettings()}});i.value=''}
function openProfile(u){if(!u)return;profTarget=u;fetch('/api/profile/'+u,{headers:{Authorization:'Bearer '+gT()}}).then(function(r){return r.json()}).then(function(d){profIsFriend=d.isFriend;document.getElementById('pm-avatar').innerHTML=d.profile.avatar?'<img src="'+d.profile.avatar+'">':aL(d.displayName||d.username);document.getElementById('pm-avatar').style.background=aC(d.username);document.getElementById('pm-name').textContent=d.displayName||d.username;document.getElementById('pm-tag').textContent=d.profile.nametag||'';document.getElementById('pm-status').textContent=d.online?'в сети':fSeen(d.lastSeen);document.getElementById('pm-status').style.color=d.online?'var(--green)':'var(--text3)';document.getElementById('pm-bio').textContent=d.profile.bio||'';document.getElementById('pm-bday').textContent=d.profile.birthday?new Date(d.profile.birthday).toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'}):'—';document.getElementById('pm-created').textContent=d.created?fDate(d.created):'—';var fb=document.getElementById('pm-friend-btn');fb.textContent=d.isFriend?'✕ Удалить':'👥 Добавить';var ms=document.getElementById('pm-media-section'),mg=document.getElementById('pm-media');if(d.media&&d.media.length){ms.style.display='';mg.innerHTML=d.media.map(function(m){return m.type==='image'?'<img src="'+m.filePath+'" onclick="viewImg(\''+m.filePath+'\')">':'<video src="'+m.filePath+'" controls></video>'}).join('')}else ms.style.display='none';if(u===me)document.getElementById('pm-actions').style.display='none';else document.getElementById('pm-actions').style.display='';document.getElementById('profile-modal').classList.add('show')})}
function openMyProfile(){openProfile(me)}
function openChatFrom(){document.getElementById('profile-modal').classList.remove('show');openChat(profTarget)}
function toggleFriend(){if(profIsFriend)removeFriend(profTarget);else sendReq(profTarget);document.getElementById('profile-modal').classList.remove('show')}

function applyTheme(){var t=localStorage.getItem('theme')||'';var isLight=localStorage.getItem('lightMode')==='1';document.body.className=t+(isLight?' light':'');document.querySelectorAll('.theme-dot').forEach(function(d){d.classList.toggle('active',d.getAttribute('data-theme')===t||(d.getAttribute('data-theme')==='light'&&isLight))})}
function setTheme(c){localStorage.setItem('theme',c);if(c!=='light')applyTheme();else toggleLight();}
function toggleLight(){var cur=localStorage.getItem('lightMode')==='1';localStorage.setItem('lightMode',cur?'0':'1');applyTheme()}
function applyChatBg(){var bg=localStorage.getItem('chatBg')||'';var el=document.getElementById('messages');if(el)el.style.background=bg||'';document.querySelectorAll('.bg-opt').forEach(function(b){b.classList.toggle('active',false)})}
function setChatBg(bg){localStorage.setItem('chatBg',bg);applyChatBg()}
</script>
</body>
</html>
